<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      (function () {
        var target = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem("orecchio.redirectPath", target);
        window.location.replace("/?p=" + encodeURIComponent(target));
      })();
    </script>
  </body>
</html>
