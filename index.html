<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orecchio: The All Hearing Ear.</title>
    <link rel="icon" type="image/png" href="./orecchio.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const saved = localStorage.getItem("orecchio.theme");
        const theme = saved === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div class="brand">
          <img class="brand-logo" src="./orecchio.png" alt="Orecchio logo" />
          <div>
            <h1>Orecchio: The All Hearing Ear.</h1>
            <p class="subhead">Acoustic Events Dashboard: Wytheville, Virginia</p>
            <p id="last-updated" class="last-updated">Last updated: --</p>
          </div>
          <button id="theme-toggle" class="theme-toggle" type="button">Dark mode</button>
        </div>
      </header>

      <section class="panel controls-panel">
        <div class="controls-grid">
          <label>
            Start date
            <input id="start-date" type="date" />
          </label>
          <label>
            End date
            <input id="end-date" type="date" />
          </label>
        </div>
        <div id="event-type-filters" class="event-type-filters"></div>
        <p id="status" class="status">Initializing...</p>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Day Timeline (US/Eastern)</h2>
          <span id="selected-day-label" class="selected-day-label"></span>
        </div>
        <div id="timeline-legend" class="type-legend"></div>
        <div id="timeline-chart" class="chart-container"></div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Past 7 Days Event Time (Stacked)</h2>
        </div>
        <div id="summary-legend" class="type-legend"></div>
        <div id="summary-chart" class="chart-container"></div>
      </section>

      <footer class="page-footer">
        Copyright 2026 Capt Pickles EnviroMetricks Division
      </footer>
    </main>

    <script src="./config/site-config.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
